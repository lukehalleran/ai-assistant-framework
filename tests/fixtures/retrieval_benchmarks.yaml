    min_recall: 0.0
    description: "Morning greeting should not surface old technical content"

  # -------------------------------------------------------------------------
  # TECHNICAL_HELP — relevance-heavy, skills-oriented
  # Weights: relevance=0.45, truth=0.20, recency=0.15
