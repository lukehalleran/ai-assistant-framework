  # -------------------------------------------------------------------------
  # META_CONVERSATIONAL — episodic/summary content
  # Weights: relevance=0.30, recency=0.20, importance=0.15
  # Note: get_memories() routes meta queries to a special retrieval path
  # that pulls from corpus, so we relax retrieval assertions.
  # -------------------------------------------------------------------------

  - id: meta_about_me
