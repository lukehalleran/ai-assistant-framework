# ===========================================================================
# TEST CASES
# ===========================================================================
# Each case tests intent classification + retrieval quality.
# must_retrieve/must_not_retrieve reference seed memory IDs.
# Memories are matched by their 'marker' substring in returned content.

test_cases:

  # -------------------------------------------------------------------------
  # FACTUAL_RECALL — truth-weighted, high relevance
  # Weights: relevance=0.40, recency=0.10, truth=0.30
  # -------------------------------------------------------------------------

  - id: factual_dogs_name
    query: "What is my dog's name?"
    expected_intent: factual_recall
    expected_confidence_min: 0.70
    must_retrieve:
      - mem_conv_dog
    must_not_retrieve:
      - mem_conv_math
      - mem_conv_cooking
    top_k: 10
    min_recall: 1.0
    description: "Should retrieve the conversation mentioning Biscuit the golden retriever"

  - id: factual_language_preference
    query: "What is my preferred programming language for data analysis?"
    expected_intent: factual_recall
    expected_confidence_min: 0.70
    must_retrieve:
      - mem_conv_python
    must_not_retrieve:
      - mem_conv_cooking
    top_k: 10
    min_recall: 1.0
    description: "Should retrieve Python/data science conversation"

  - id: factual_sister_birthday
    query: "When is my sister's birthday?"
    expected_intent: factual_recall
    expected_confidence_min: 0.70
    must_retrieve:
      - mem_conv_family
    must_not_retrieve:
      - mem_conv_math
    top_k: 10
    min_recall: 1.0
    description: "Should retrieve family conversation about sister turning 30"

  # -------------------------------------------------------------------------
  # TEMPORAL_RECALL — recency-weighted
  # Weights: relevance=0.20, recency=0.40
  # -------------------------------------------------------------------------

  - id: temporal_recent_today
    query: "What did we talk about earlier today?"
    expected_intent: temporal_recall
    expected_confidence_min: 0.70
    must_retrieve:
      - mem_conv_greeting
      - mem_conv_dog
    must_not_retrieve:
      - mem_conv_redis
    top_k: 10
    min_recall: 1.0
    expected_score_order:
      - mem_conv_greeting
      - mem_conv_dog
    description: "Recent memories should rank highest; greeting (1h) before dog (2h)"

  - id: temporal_last_week
    query: "What happened last week?"
    expected_intent: temporal_recall
    expected_confidence_min: 0.70
    must_retrieve:
      - mem_sum_week1
    must_not_retrieve: []
    top_k: 25
    min_recall: 1.0
    description: >
      Temporal-aware recency decay reshapes the curve so 168h-old
      weekly summary scores recency=0.70 instead of 0.106, ensuring it
      surfaces in results (previously buried below everything at rank 20+).
      Uses top_k=25 to validate summaries appear; the key improvement is
      scoring, not filtering. Uses "What happened" to avoid meta routing.

  # -------------------------------------------------------------------------
  # EMOTIONAL_SUPPORT — continuity-weighted, empathetic content
  # Weights: relevance=0.25, recency=0.30, continuity=0.25
  # -------------------------------------------------------------------------

  - id: emotional_stressed_at_work
    query: "I feel really stressed and overwhelmed with work right now"
    expected_intent: emotional_support
    expected_confidence_min: 0.80
    must_retrieve:
      - mem_conv_stress
    must_not_retrieve:
      - mem_conv_math
      - mem_conv_redis
    top_k: 10
    min_recall: 1.0
    description: "Should retrieve stress-related conversations, not technical content"

  - id: emotional_anxious_cant_sleep
    query: "I'm so anxious I can't sleep at night"
    expected_intent: emotional_support
    expected_confidence_min: 0.80
    must_retrieve:
      - mem_conv_anxiety
    must_not_retrieve:
      - mem_conv_math
      - mem_conv_cooking
    top_k: 10
    min_recall: 1.0
    description: "Should retrieve anxiety conversation, not unrelated content"

  # -------------------------------------------------------------------------
  # CASUAL_SOCIAL — gate=0.65, minimal retrieval
  # Weights: relevance=0.20, recency=0.35, continuity=0.25
  # -------------------------------------------------------------------------

  - id: casual_thanks
    query: "Thanks!"
    expected_intent: casual_social
    expected_confidence_min: 0.90
    must_retrieve: []
    must_not_retrieve:
      - mem_conv_math
      - mem_conv_redis
    top_k: 5
    min_recall: 0.0
    description: "Casual query should not surface deep technical memories"

  - id: casual_good_morning
    query: "Good morning!"
    expected_intent: casual_social
    expected_confidence_min: 0.90
    must_retrieve: []
    must_not_retrieve:
      - mem_conv_math
      - mem_conv_redis
