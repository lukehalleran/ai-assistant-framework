  # -------------------------------------------------------------------------
  # GENERAL — fallback intent, no strict retrieval requirements
  # Default weights, no overrides
  # -------------------------------------------------------------------------

  - id: general_autumn_thoughts
    query: "The colors of autumn are quite beautiful this year"
    expected_intent: general
    expected_confidence_min: 0.0
    must_retrieve: []
    must_not_retrieve: []
    top_k: 10
    min_recall: 0.0
