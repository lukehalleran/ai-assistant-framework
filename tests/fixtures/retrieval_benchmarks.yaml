  # -------------------------------------------------------------------------
  # PROJECT_WORK — code/feature/PR oriented
  # Weights: relevance=0.40, truth=0.25, recency=0.15
  # -------------------------------------------------------------------------

  - id: project_auth_status
    query: "Let's add rate limiting to the authentication module"
