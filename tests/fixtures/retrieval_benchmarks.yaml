  - id: mem_conv_greeting
    marker: "How are you doing today"
    collection: conversations
    also_in_corpus: true
    query: "Good morning!"
    response: "Good morning! How are you doing today? I hope you slept well."
    timestamp_offset_hours: -1
    truth_score: 0.6
    importance_score: 0.3
    tags: "greeting,social"

