# Retrieval Quality Benchmark Configuration
# ===========================================
# Reference time: 2026-02-15 12:00:00 UTC
# All timestamp_offset_hours are relative to this reference time.
# Negative values = hours before reference time.
#
# Seed memories are loaded into ChromaDB (real embeddings) and optionally
# into CorpusManager (JSON) for dual-retrieval testing.
#
# Test cases validate intent classification AND retrieval quality:
#   - must_retrieve: seed memory IDs that MUST appear in top-K results
#   - must_not_retrieve: seed memory IDs that must NOT appear in results
#   - expected_score_order: optional ordering constraint on results

seed_memories:

  # =========================================================================
  # CONVERSATIONS — seeded in ChromaDB 'conversations' + optionally corpus
