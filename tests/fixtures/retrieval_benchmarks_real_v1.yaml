  - id: real_conversations_019
    content_hash: "07ab7a899b85d0ec"
    marker: "thats in my"
    collection: conversations
    query: "ok none of thats in my notes. going to embed lectures so we can be sure i didnt miss that. second, I also missed the indepedant factors method where we test subsets off combinations and use regression to est effects, only when factors are ind of course. Next I forgot to mention blocking factors. So a blocking factor is one that makes repsentiive testing hard. for example the car price vrs color red vrs blue but color is a blocking factor since it correlates with is a sports car bin var which corraltes with price. I also forgot to mention this andf ii think its important, doe approoaches are helpful BEFORE either modeling or data collection"
    response: "Good additions — those are real gaps worth plugging before the midterm. Let me flesh each one out: **Independent factors method (fractional factorial):** When factors are independent of each other, you can test a structured subset of all possible combinations instead of the full factorial. You then run regression on that subset to estimate each factor's effect. The independence assumption is load-bearing here — if factors correlate, the estimates bleed into each other (confounding), and you can't cleanly attribute an effect to a single factor. So \"only when independent\" isn't a footnote, it's the whole condition. **Blocking factors:** Your car example is right, though worth sharpening: the issue is that color and sports-car-ness are correlated, so if you're trying to test, say, the effect of some other feature on price, color \"blocks\" your ability to get a clean sample. You might end up with all your red cars being sports cars and all blue being sedans — now you can't tell if price differences are from what you're actually testing or from the sport/sedan split. The solution is to explicitly control for (block on) that variable so its effect gets isolated, not absorbed into your treatment estimate. **DOE as a planning tool (before modeling AND before data collection):** This is actually a key conceptual shift from everything else in the course. Everything prior assumed data exists — DOE says \"wait, what data do we even need to collect?\" You use it *before* collecting data to ensure the subset you gather will actually let you answer your question. And *before* modeling because the structure of your data determines what models are even feasible. Bad data collection design = no amount of modeling skill saves you. On lecture embedding — yeah, that's worth doing. If you can get the transcripts into the vault, we can search them directly instead of guessing whether something was covered."
    also_in_corpus: false
    timestamp_offset_hours: -956.5
    truth_score: 0.8
    importance_score: 0.8999999999999999
    tags: "topic:Lecture Embedding,topic:general"

