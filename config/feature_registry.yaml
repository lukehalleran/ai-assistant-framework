# config/feature_registry.yaml
# Retrospective feature registry — audit trail for shipped features.
#
# Purpose: Catalog of implemented features with supervision metadata.
# Agents on sub-branches consult this to check dependencies, avoid
# conflicts, and understand what already exists. Main branch uses
# this alongside CodeProposal records to gate merge decisions.
#
# Schema per entry:
#   proposal_id:        Unique slug (snake_case)
#   title:              Human-readable name
#   status:             implemented | partial | deprecated
#   source:             how it originated (manual, goal_directed, incident, user_request)
#   risk_level:         low | medium | high | critical
#   touches_core_system: whether it modifies orchestrator/pipeline/coordinator/safety
#   depends_on:         list of proposal_ids this depends on
#   implemented_files:  source files
#   test_files:         test files that validate it
#   outcome:
#     accepted:         bool
#     notes:            human reviewer notes
#     merged_at:        ISO date of merge (approximate for pre-registry features)

features:

  # ── Safety & Guards ──────────────────────────────────────────────

  - proposal_id: agent_safety_guards
    title: "3-Layer Agent Safety Guards"
    status: implemented
    source: incident
    risk_level: high
    touches_core_system: true
    depends_on: []
    implemented_files:
      - utils/destructive_op_guard.py
      - utils/fs_snapshot.py
      - utils/shell_cmd_guard.py
      - utils/python_fs_guard.py
      - scripts/safe_git.sh
      - scripts/safe_cmd.sh
      - scripts/activate_guards.sh
      - scripts/bin/usercustomize.py
    test_files:
      - tests/unit/test_destructive_op_guard.py
      - tests/unit/test_fs_snapshot.py
      - tests/unit/test_shell_cmd_guard.py
      - tests/unit/test_python_fs_guard.py
    outcome:
      accepted: true
      notes: "Expanded beyond original scope with shell and Python guards. 3 layers: git command classifier, shell command classifier, Python monkey-patch guard."
      merged_at: "2026-05-21"

