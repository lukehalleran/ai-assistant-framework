daemon:
  version: v4
  mode: dev
  data_dir: ./data
  log_dir: ./conversation_logs
  in_harm_test: false
  debug_mode: false
  log_level: INFO
  device: cuda
memory:
  corpus_file: ./data/corpus_v4.json
  chroma_path: ./data/chroma_db_v4
  max_recent: 50
  max_memories: 30
  max_final_memories: 30
  max_working_memory: 30
  mem_no: 5
  mem_importance_score: 0.75
  num_memories: 30
  prompt_max_mems: 30
  child_mem_limit: 3
  recency_decay_rate: 0.05
  truth_score_update_rate: 0.02
  truth_score_max: 0.95
  collection_boosts:
    facts: 0.1
    summaries: 0.1
    conversations: 0.3
    semantic: 0.05
    wiki: 0.05
    daemon_self_notes: -0.05
  default_summary_prompt_header: 'Summary of last 20 exchanges:

    '
  default_tagging_prompt: 'You are Daemon, my assistant. Extract 5 concise tags or
    keywords from the following input. Return them as a list, comma-separated.

    Input: "{text}"

    Tags:

    '
  retrieve_conversations: true
  max_conversations: 15
  conversation_collection: conversations
  retrieve_summaries: true
  max_summaries: 10
  summary_collection: summaries
  summary_interval: 20
  max_facts: 15
  max_reflections: 6
  hybrid_summaries_enabled: true
  hybrid_reflections_enabled: true
  user_profile_facts_per_category: 5
  prompt_max_recent: 10
  semantic_retrieval_limit: 100
  prompt_max_semantic: 15
  force_min_memories: true
models:
  default: llama
  dream_model: gpt-neo
  openrouter_base: https://openrouter.ai/api/v1
  load_local_model: true
  local_model_context_limit: 4096
  api_model_context_limit: 128000
  default_max_tokens: 9984
  heavy_topic_max_tokens: 4096
  default_top_p: 0.9
  default_top_k: 5
  default_temperature: 0.75
  openai_api_key: ''
  active: claude-opus-4.6
gating:
  confidence_threshold: 2.0
  gate_rel_threshold: 0.18
  cosine_threshold: 0.15
  cosine_similarity_threshold: 0.15
  deictic_threshold: 0.25
  normal_threshold: 0.15
  deictic_anchor_penalty: 0.25
  deictic_continuity_min: 0.25
  use_reranking: true
  rerank_use_llm: false
  cross_encoder_weight: 0.9
  topic_confidence_threshold: 0.85
  summary_cosine_threshold: 0.2
  reflection_cosine_threshold: 0.15
  score_weights:
    relevance: 0.3
    recency: 0.22
    truth: 0.18
    importance: 0.05
    continuity: 0.1
    structure: 0.05
    topic_match: 0.1
paths:
  system_prompt: core/system_prompt.txt
  directives: structured_directives.txt
  system_prompt_file:
    name: daemon
    system_prompt_file: /home/lukeh/Daemon_RAG_Agent_working/core/system_prompt.txt
features:
  enable_wikipedia: true
  enable_semantic_search: true
  enable_facts: true
  enable_dreams: false
  semantic_only_mode: false
  enable_best_of: false
  enable_query_rewrite: true
  disable_llm_summaries: false
  best_of_latency_budget_s: 0.0
  rewrite_timeout_s: 0
  best_of_model: gpt-4o
  best_of_max_tokens: 8816
  best_of_min_question: false
  best_of_generator_models:
  - claude-opus-4.6
  - gemini-3-pro
  best_of_selector_models:
  - gpt-4o-mini
  - gpt-4.1
  best_of_selector_weights:
    heuristic: 0.4
    llm: 0.6
  best_of_selector_top_k: 0
  best_of_selector_max_tokens: 80
  best_of_duel_mode: false
web_search:
  enabled: true
  api_key: ''
  timeout_s: 30.0
  max_content_chars: 10000
  daily_credit_limit: 100
  llm_first_enabled: true
  trigger_model: gpt-4o-mini
  trigger_timeout_s: 5.0
  trigger_max_tokens: 150
  llm_heuristic_weight: 0.7
  confidence_threshold: 0.5
agentic_search:
  enabled: true
  max_rounds: 5
  context_budget_tokens: 8000
  compression_model: sonnet-4.5
  prefer_native_tools: true
  memory_search_enabled: true
  memory_search_limit: 7
uncertainty_fallback:
  enabled: true
  semantic_threshold: 0.7
  max_length: 400
response_planning:
  enabled: true
  model: gpt-4o-mini
  max_tokens: 200
  timeout: 5.0
  review_enabled: true
  review_model: gpt-4o-mini
  review_max_tokens: 200
  review_confidence_threshold: 0.9
  review_timeout: 5.0
file_access:
  enabled: true
  approved_folders:
  - .
  - ~/Documents/Luke Notes
  - ~/Documents
  - ~/Downloads
  max_read_bytes: 100000
  max_grep_results: 25
  max_list_entries: 200
  allowed_extensions:
  - .py
  - .md
  - .txt
  - .json
  - .yaml
  - .yml
  - .toml
  - .cfg
  - .ini
  - .log
  - .csv
  - .doc
  - .docx
  - .pdf
  - .rst
  - .tex
  - .xml
memory_expansion:
  enabled: true
  max_per_session: 3
  max_window: 5
  default_window: 3
  max_total_tokens: 2000
  anchor_char_limit: 600
  context_char_limit: 300
daily_notes:
  enabled: true
  folder: Vault/Daily Notes and To Do's
  model: sonnet-4.5
  max_tokens: 800
  weekly_enabled: true
  weekly_model: sonnet-4.5
  weekly_max_tokens: 1200
  monthly_enabled: true
  monthly_model: sonnet-4.5
  monthly_max_tokens: 2000
tag_generation:
  enabled: true
  model: sonnet-4.5
  max_tags: 10
  min_tags: 3
narrative_context:
  enabled: true
  weeklies_count: 3
  monthlies_count: 1
  dailies_count: 6
intent_classifier:
  enabled: true
  stm_refinement_threshold: 0.5
  section_gating_enabled: true
entity_facts:
  enabled: true
  per_turn_cap: 4
  user_per_turn_cap: 6
  min_confidence: 0.55
schedule_extraction:
  enabled: true
  prompt_max_events: 10
  lookahead_days: 7
  bare_time_min_confidence: 0.5
reference_docs:
  auto_seed: true
  seed_paths:
  - docs
fact_verification:
  enabled: true
  llm_enabled: true
  model: gpt-4o-mini
  user_trust_threshold: 0.85
  max_candidates: 10
proactive_surfacing:
  enabled: true
  min_graph_nodes: 20
  min_graph_edges: 15
  max_insights: 2
  cooldown_hours: 72
  model: gpt-4o-mini
  history_path: data/surfacing_history.json
  max_prompt_insights: 2
knowledge_graph:
  enabled: true
  persist_path: data/knowledge_graph.json
  retrieval_depth: 2
  max_sentences: 15
  auto_save_threshold: 50
  min_confidence: 0.5
  aliases_path: data/entity_aliases.json
  max_prompt_sentences: 12
  scoring_boost_enabled: true
  scoring_boost_cap: 0.15
  query_expansion_enabled: true
  query_expansion_max_terms: 8
session_diff:
  enabled: true
  max_committed: 20
  max_uncommitted: 20
token_budget:
  default: 15000
  local_model: 12000
  floor: 8000
  ceiling: 16000
  context_fraction: 0.12
llm_compression:
  enabled: true
  model: gpt-4o-mini
  timeout_s: 3.0
  ratio_threshold: 3.0
  max_batch: 8
thread_surfacing:
  enabled: true
  max_open: 50
  stale_days: 14
  deadline_grace_hours: 48
  max_surfaced: 3
  model_alias: ''
staleness:
  enabled: true
  max_penalty: 0.4
  weight: 0.15
  steep_threshold: 0.8
  steep_multiplier: 2.0
  historical_threshold: 0.6
  reflection_weight_factor: 0.6
  index_path: data/claim_index.json
implementation_tracking:
  enabled: true
  cooldown_seconds: 86400
  confidence_confirmed: 0.85
  confidence_likely: 0.6
  git_depth: 50
  at_shutdown: true
  auto_complete: false
provenance:
  enabled: true
  thinking_max_chars: 4000
synthesis:
  enabled: false
  batch_size: 100
  log_rejections: true
  min_token_length: 10
  max_repetition_ratio: 0.5
  min_domains: 2
  distance_min: 0.2
  distance_max: 0.9
  use_percentile_thresholds: false
  novelty_known_threshold: 0.88
  novelty_adjacent_threshold: 0.7
  cooccurrence_known_threshold: 0.85
  memory_similarity_threshold: 0.85
  coherence_model: claude-opus-4.6
  coherence_min_level: MODERATE
  weights:
    coherence: 0.3
    novelty: 0.4
    distance: 0.15
    structural: 0.15
  composite_min_score: 0.65
  convergence_strong_paths: 3
  convergence_strong_sources: 2
synthesis_generator:
  enabled: false
  candidates_per_session: 5
  llm_concurrency: 5
  min_graph_nodes: 20
synthesis_retrieval:
  enabled: false
  structural_query_max_tokens: 100
  retrieval_k: 5
  min_similarity: 0.25
  bridge_on_accept: true
  bridge_relation: structural_parallel
synthesis_audit:
  enabled: true
  fp_halt_threshold: 0.5
  min_graded: 10
wikidata_import:
  enabled: true
  persist_path: data/wikidata_cache.json
  entities_per_domain: 5000
  max_total_entities: 50000
  sparql_batch_size: 500
  embedding_match_threshold: 0.6
graph_walk:
  enabled: false
  max_walk_length: 8
  walks_per_seed: 20
  restart_probability: 0.15
  min_path_length: 3
  max_candidates_per_session: 10
  boundary_crossing_required: true
  min_bridge_edges: 40
  personal_return_bias: 2.0
visual_memory:
  enabled: true
  clip_model: ViT-B-32
  clip_pretrained: openai
  max_images_prompt: 3
  caption_model: gpt-4o-mini
  caption_timeout_s: 10.0
  similarity_threshold: 0.2
  ingest_on_upload: true
  ingest_on_obsidian_sync: true
wiki_enrichment:
  enabled: true
  max_articles_per_session: 15
  min_text_length: 200
  shutdown_step_timeout_s: 30
  edge_relation_type: mentioned_alongside
  edge_default_weight: 0.5
procedural_skills:
  enabled: true
  prompt_max_skills: 5
  dedup_threshold: 0.85
skill_activation:
  enabled: true
  max_skills: 3
  min_score: 0.25
  cooldown_hours: 48.0
  fetch_multiplier: 3
  stm_bonus: 0.1
  use_stm: true
code_proposals:
  enabled: true
  collection: proposals
  dedup_threshold: 0.7
  max_per_session: 5
  require_tests: true
behavioral_patterns:
  enabled: true
  min_turns: 3
  max_patterns: 3
escalation_tracker:
  enabled: true
  threshold: 3
  deescalation_window: 2
cross_dedup:
  enabled: true
  duplicate_threshold: 0.92
  contradiction_threshold: 0.85
  max_docs_per_collection: 1000
  on_shutdown: true
user_profile:
  ephemeral_relations:
  - current_activity
  - current_feeling
  - current_mood
  - emotional_state
  - current_state
  - status
  - recent_activity
  - feeling
  - feels
git_stats:
  enabled: true
  timeout_s: 10
  max_output_lines: 50
github_api:
  enabled: true
  timeout_s: 15
  max_output_lines: 80
  repo: ''
document_generation:
  enabled: true
  output_dir: documents
  max_sources: 10
  report_max_sections: 5
  summary_max_sections: 3
  report_token_budget: 6000
  summary_token_budget: 2000
daemon_notes:
  enabled: true
  output_dir: daemon_notes
  max_per_prompt: 2
  collection_boost: -0.05
internet_actions:
  enabled: true
  telegram_bot_token: ''
  telegram_default_chat_id: ''
  discord_webhook_url: ''
  smtp_host: smtp.gmail.com
  smtp_port: 587
  smtp_user: lukehalleran@gmail.com
  smtp_password: ''
  smtp_from: lukehalleran@gmail.com
  github_write_enabled: false
  google_client_id: ''
  google_client_secret: ''
  google_token_path: data/google_token.json
  google_calendar_enabled: true
  google_calendar_max_events: 10
  google_calendar_lookahead_days: 7
  google_contacts_enabled: true
  google_other_contacts_enabled: true
  # Gmail header search (fallback — requires gmail.readonly scope)
  google_gmail_search_enabled: true
  playwright_enabled: false
  playwright_timeout_s: 30
  action_ttl_seconds: 300
  max_pending_actions: 5
  audit_log_path: logs/actions_audit.jsonl
prompts:
  default_system_prompt: You are Daemon, a brutally honest AI assistant who tells
    the truth even when uncomfortable, admits ignorance freely, and uses dark humor
    about current events. You're willing to call out BS while still being genuinely
    helpful.
  system_prompt: ''
  default_core_directive:
    query: '[CORE DIRECTIVE]'
    response: You are an AI assistant. You are helpful, reliable, and memory-persistent.
      You should respect user intent and be aligned with their goals.
    timestamp: ''
    tags:
    - '@seed'
    - core
    - directive
    - safety
